<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 300px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #47536e;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
             <input type="checkbox" id="stay" name="stay" value="stay_logged_in">
    <label for="stay" style="display: flex; justify-content: center; align-items: center; ">Stay logged in?</label>
    <br>
            <button type="submit">Login</button>
            <br>
            <br>
                <button type="button" onclick="window.alert('Call me.')">Forgot username/password?</button>
        </form>
        <div id="error" class="error"></div>
    </div>

    <script>
        let attempts = 0;
        const Attempts = 3;
        const Username = 'janedoe';
        const Password = 'password';

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');

            if (username === Username && password === Password) {
                window.location.href = 'dashboard.html';
            } else {
                attempts++;
                if (attempts >= Attempts) {
                    errorDiv.textContent = 'Too many failed attempts. Login disabled.';
                    document.querySelector('button').disabled = true;
                } else {
                    errorDiv.textContent = `Invalid credentials. ${Attempts - attempts} attempts remaining.`;
                }
            }
        });
    </script>
</body>
</html>
